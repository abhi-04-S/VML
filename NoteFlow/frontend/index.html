<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Quick Note Application with Authentication">
    <title>NoteFlow - Secure Notes</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <h1>NoteFlow</h1>
            <p>Capture your thoughts securely</p>
            <!-- Logout button, hidden by default -->
            <button id="logout-btn" class="btn-secondary hidden" style="margin-top: 1rem;">Logout</button>
        </header>

        <main>
            <!-- AUTHENTICATION SECTION (Visible when logged out) -->
            <section id="auth-section" class="glass-panel auth-panel">
                <h2 id="auth-title">Login to Your Account</h2>
                
                <form id="auth-form">
                    <div class="input-group">
                        <label for="auth-username">Username</label>
                        <input type="text" id="auth-username" placeholder="Enter username" required>
                    </div>
                    <div class="input-group">
                        <label for="auth-password">Password</label>
                        <input type="password" id="auth-password" placeholder="Enter password" required>
                    </div>
                    <button type="submit" id="auth-submit-btn" class="btn-primary">Login</button>
                </form>
                
                <div class="auth-toggle">
                    <span id="auth-toggle-text">Don't have an account?</span>
                    <button id="auth-toggle-btn" class="btn-text">Register here</button>
                </div>
            </section>

            <!-- APPLICATION SECTION (Visible when logged in) -->
            <div id="app-section" class="hidden">
                <!-- Form to create a new note -->
                <section class="note-creation-section glass-panel">
                    <h2>Create a Note</h2>
                    <form id="note-form">
                        <div class="input-group">
                            <label for="note-title">Title</label>
                            <input type="text" id="note-title" placeholder="Enter note title..." required>
                        </div>
                        <div class="input-group">
                            <label for="note-content">Content</label>
                            <textarea id="note-content" rows="4" placeholder="Write your thoughts here..." required></textarea>
                        </div>
                        <button type="submit" class="btn-primary">Save Note</button>
                    </form>
                </section>

                <!-- Area where saved notes will be displayed -->
                <section class="notes-display-section">
                    <h2>Your Secure Notes</h2>
                    <div id="notes-grid" class="notes-grid">
                        <div class="loading-state">Loading notes...</div>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
